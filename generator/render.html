<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Štítky – render</title>
<style>
  :root {
    --cols: 3;
    --rows: 8;
    --font: 28;
    --family: "Segoe UI", Arial, sans-serif;
    --margin: 10mm;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #fff; }

  .page {
    width: 210mm;
    height: 297mm;
    padding: var(--margin);
    background: #fff;
  }
  .sheet { position: relative; width: 100%; height: 100%; }

  .grid {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(var(--cols), 1fr);
    grid-auto-rows: 1fr;
  }

  .crops { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
  .crops line { stroke: #000; stroke-width: 0.6; shape-rendering: crispEdges; }

  .cell {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    text-align: right;
    padding: 4mm;
    font-size: calc(var(--font) * 1pt);
    font-family: var(--family);
    font-weight: 700;
    line-height: 1.1;
    white-space: pre;
    overflow: hidden;
  }

  @page { size: A4; margin: 0; }
  @media print {
    .page { width: 210mm; height: 297mm; }
    .cell { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
  <div class="page">
    <div class="sheet">
      <div class="grid" id="grid"></div>
      <svg class="crops" id="crops" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

<script>
  const grid  = document.getElementById('grid');
  const crops = document.getElementById('crops');
  const root  = document.documentElement;
  const COLS  = 3;
  const PT_TO_PX = 96 / 72;

  // Parametry z URL: ?a=Mária&b=Ján&rows=8&font=40&family=...
  const q = new URLSearchParams(location.search);
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  // Jména: a a b, prázdná/jen-mezery se zahodí; vnitřní mezery se zachovají.
  const names = [q.get('a'), q.get('b')]
    .filter(s => s !== null && s.trim().length > 0)
    .slice(0, 2);
  const rows   = clamp(parseInt(q.get('rows')) || 8, 1, 30);
  const maxF   = clamp(parseInt(q.get('font')) || 40, 8, 120);
  const family = q.get('family') || '"Segoe UI", Arial, sans-serif';

  function fitFontPt(maxPt) {
    const sample = grid.querySelector('.cell');
    if (!sample || !names.length) return maxPt;
    const cs = getComputedStyle(sample);
    const avail = sample.clientWidth
      - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight) - 2;
    const ctx = (fitFontPt._ctx ||= document.createElement('canvas').getContext('2d'));
    let result = maxPt;
    names.forEach(name => {
      let lo = 6, hi = maxPt, best = 6;
      for (let k = 0; k < 24; k++) {
        const mid = (lo + hi) / 2;
        ctx.font = `700 ${mid * PT_TO_PX}px ${family}`;
        if (ctx.measureText(name).width <= avail) { best = mid; lo = mid; }
        else { hi = mid; }
      }
      if (best < result) result = best;
    });
    return result;
  }

  function renderCrops() {
    const W = grid.clientWidth, H = grid.clientHeight;
    if (!W || !H) return;
    const arm = 5.5;
    crops.setAttribute('viewBox', `0 0 ${W} ${H}`);
    crops.setAttribute('preserveAspectRatio', 'none');
    let svg = '';
    for (let c = 0; c <= COLS; c++) {
      const x = W * c / COLS;
      for (let r = 0; r <= rows; r++) {
        const y = H * r / rows;
        svg += `<line x1="${x-arm}" y1="${y}" x2="${x+arm}" y2="${y}"/>`;
        svg += `<line x1="${x}" y1="${y-arm}" x2="${x}" y2="${y+arm}"/>`;
      }
    }
    crops.innerHTML = svg;
  }

  function render() {
    root.style.setProperty('--rows', rows);
    root.style.setProperty('--family', family);
    const split = names.length >= 2 ? Math.ceil(rows / 2) : rows;
    grid.innerHTML = '';
    for (let r = 0; r < rows; r++) {
      const idx  = (names.length >= 2 && r >= split) ? 1 : 0;
      const name = names.length === 0 ? '' : names[idx];
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = name;
        grid.appendChild(cell);
      }
    }
    root.style.setProperty('--font', fitFontPt(maxF).toFixed(2));
    renderCrops();
    document.title = names.join('_');
  }

  function go() { render(); }
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(go);
  else go();
  go();
</script>
</body>
</html>
